        <div class="cutter-card">
            <div class="mb-4 form-group">
                <label for="audioInput" data-i18n="step1">1. 選擇 MP3 檔案</label>
                <input type="file" class="form-control" id="audioInput" accept=".mp3,audio/mpeg">
            </div>

            <div class="mb-4 form-group">
                <label data-i18n="step2">2. 選擇切割模式</label>
                <div class="d-flex gap-3 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="cutMode" id="modeAuto" value="auto" checked
                            onchange="toggleMode()">
                        <label class="form-check-label" for="modeAuto" data-i18n="mode_auto">
                            自動分割 (每隔固定時間)
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="cutMode" id="modeManual" value="manual"
                            onchange="toggleMode()">
                        <label class="form-check-label" for="modeManual" data-i18n="mode_manual">
                            指定範圍 (從 A 到 B)
                        </label>
                    </div>
                </div>

                <div id="autoSettings">
                    <div class="input-group-custom">
                        <input type="number" class="form-control" id="segmentDuration" value="10" min="1"
                            placeholder="輸入長度" data-i18n-placeholder="input_length">
                        <select class="form-select" id="timeUnit">
                            <option value="seconds" data-i18n="unit_sec">秒 (Seconds)</option>
                            <option value="minutes" selected data-i18n="unit_min">分鐘 (Minutes)</option>
                        </select>
                    </div>
                </div>

                <div id="manualSettings" style="display:none;">
                    <div class="row g-2">
                        <!-- Start Time -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary fw-bold" style="font-size: 0.9em;"
                                data-i18n="start_time">開始時間
                                (Start)</label>
                            <div class="input-group input-group-sm">
                                <input type="number" class="form-control text-center" id="startH" placeholder="0"
                                    min="0" value="0">
                                <span class="input-group-text">Hr</span>
                                <input type="number" class="form-control text-center" id="startM" placeholder="0"
                                    min="0" max="59" value="0">
                                <span class="input-group-text">Min</span>
                                <input type="number" class="form-control text-center" id="startS" placeholder="0"
                                    min="0" max="59" value="0">
                                <span class="input-group-text">Sec</span>
                            </div>
                        </div>

                        <!-- End Time -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary fw-bold" style="font-size: 0.9em;"
                                data-i18n="end_time">結束時間
                                (End)</label>
                            <div class="input-group input-group-sm">
                                <input type="number" class="form-control text-center" id="endH" placeholder="0" min="0"
                                    value="0">
                                <span class="input-group-text">Hr</span>
                                <input type="number" class="form-control text-center" id="endM" placeholder="0" min="0"
                                    max="59" value="0">
                                <span class="input-group-text">Min</span>
                                <input type="number" class="form-control text-center" id="endS" placeholder="0" min="0"
                                    max="59" value="0">
                                <span class="input-group-text">Sec</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-end mt-1">
                        <small class="text-muted" style="font-size: 0.8em;" data-i18n="end_note">(結束時間全填 0
                            代表切到最後)</small>
                    </div>
                </div>
            </div>

            <button id="startBtn" class="btn btn-primary w-100 py-2 fw-bold" onclick="startProcessing()"

                <i class="bi bi-scissors"></i> 開始切割
