    <script>
        // --- i18n Logic ---
        const translations = {
            'zh-TW': {
                'head_title': '小工具 - T5筆畫輸入法',

                'footer_support': '支持',
                'footer_privacy': '隱私權政策'
            },
            'en': {
                'head_title': 'Tools - T5 Input',
                'page_title': 'Useful Tools',
                'navbar_dict': 'Dictionary',
                'navbar_tutor': 'Tutorial',
                'navbar_about': 'About',
                'navbar_full': 'Full Input',
                'navbar_tools': 'Tools',
                'navbar_ext': 'Extension',
                'navbar_comment': 'Discuss',
                'tool_audio_title': 'MP3 Cutter (Auto/Manual)',
                'tool_audio_desc': 'Powerful online MP3 cutter! Supports both "Auto Split by Interval" and "Manual Range Cut" modes. No uploads, no installation - lightning-fast browser-based processing for complete privacy.',
                'tool_qrcode_title': 'QR Code Generator',
                'tool_qrcode_desc': 'Quickly convert text or URLs into QR Codes. Supports custom size and error correction levels.',
                'tool_recorder_title': 'Online Screen Recorder',
                'tool_recorder_desc': 'Record your screen directly in the browser. Supports pause/resume, microphone audio, system audio capture. No installation required.',
                'footer_support': 'Support',
                'footer_privacy': 'Privacy Policy'
            }
        };

        let currentLang = localStorage.getItem('lang');
        if (!currentLang) {
            const userLang = navigator.language || navigator.userLanguage;
            // Default to English, only switch to Chinese for Traditional Chinese users
            if (/zh-(hk|tw|hant)/i.test(userLang)) {
                currentLang = 'zh-TW';
            } else {
                currentLang = 'en';
            }
        }

        // Update HTML lang attribute
        function updateHtmlLang() {
            document.documentElement.lang = currentLang === 'zh-TW' ? 'zh-Hant' : 'en';
        }

        // Update title and meta description dynamically
        function updateMetaTags() {
            const titleMap = {
                'zh-TW': '小工具 - T5筆畫輸入法',
                'en': 'Free Online Tools - MP3 Cutter, QR Code Generator, Screen Recorder | T5 Input'
            };
            const descMap = {
                'zh-TW': 'T5筆畫輸入法免費線上工具集 - QR Code 產生器、螢幕錄影工具、MP3 切割工具。免安裝、免上傳,完全在瀏覽器中運行。',
                'en': 'Free online tools collection: MP3 Cutter, QR Code Generator, and Screen Recorder. No installation, no upload - all tools run directly in your browser for complete privacy.'
            };
            document.title = titleMap[currentLang];
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', descMap[currentLang]);
        }

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh-TW' ? 'en' : 'zh-TW';
            localStorage.setItem('lang', currentLang);
            updateHtmlLang();
            updateMetaTags();
            updatePageLanguage();
        }

        function updatePageLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            updateHtmlLang();
            updateMetaTags();
            updatePageLanguage();
            // ... existing code ...
            const darkModeToggle = document.getElementById('darkModeToggle');
            const sunIcon = darkModeToggle.querySelector('.swap-on');
            const moonIcon = darkModeToggle.querySelector('.swap-off');

            if (localStorage.getItem('darkMode') === 'enabled') {
                enableDarkMode();
            } else {
                disableDarkMode();
            }

            function enableDarkMode() {
                document.body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }

            function disableDarkMode() {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }

            darkModeToggle.addEventListener('click', function () {
                if (localStorage.getItem('darkMode') === 'enabled') {
                    disableDarkMode();
                } else {
                    enableDarkMode();
                }
            });
        });
    </script>
